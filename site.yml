---
- name: Build MComzOS Master Image
  hosts: all
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3
    mcomz_user: "mcomz"
    # Set true to install only what is needed for JS8Call + WiFi AP + dashboard.
    # All other services (Pat, ardopcf, Mumble, Meshtastic, MeshCore, Kiwix) are skipped.
    minimal_build: false
    # Maps ansible_architecture to Debian package arch names (aarch64 → arm64, x86_64 → amd64)
    deb_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
    # WiFi access point — override these at playbook runtime if needed
    wifi_interface: "wlan0"
    ap_ssid: "MComzOS"
    ap_password: "mcomzos1"
    ap_ip: "192.168.4.1"
    ap_dhcp_start: "192.168.4.10"
    ap_dhcp_end: "192.168.4.100"
    # Amateur radio — callsign MUST be changed for licensed operation
    callsign: "NOCALL"
    # Audio devices for radio modems — change to match your hardware (e.g. plughw:1,0)
    ardopcf_audio_in: "default"
    ardopcf_audio_out: "default"
    direwolf_audio_device: "default"

  environment:
    GIT_TERMINAL_PROMPT: "0"  # Prevent git credential prompts in chroot (no TTY available)

  tasks:
    # ---------------------------------------------------------
    # PHASE 0: WIFI ACCESS POINT & NETWORK
    # ---------------------------------------------------------
    - name: Install WiFi AP and network advertisement services
      apt:
        name:
          - hostapd
          - dnsmasq
          - avahi-daemon
          - dbus
        state: present

    - name: Ensure WiFi radio is not blocked by rfkill
      command: rfkill unblock wifi
      changed_when: false
      failed_when: false

    - name: Ensure NetworkManager conf.d directory exists
      file:
        path: /etc/NetworkManager/conf.d
        state: directory
        mode: '0755'

    - name: Ensure network interfaces directory exists
      file:
        path: /etc/network/interfaces.d
        state: directory
        mode: '0755'

    - name: Configure hostapd (WiFi access point)
      copy:
        dest: /etc/hostapd/hostapd.conf
        content: |
          interface={{ wifi_interface }}
          driver=nl80211
          ssid={{ ap_ssid }}
          hw_mode=g
          channel=7
          wmm_enabled=0
          macaddr_acl=0
          auth_algs=1
          ignore_broadcast_ssid=0
          wpa=2
          wpa_passphrase={{ ap_password }}
          wpa_key_mgmt=WPA-PSK
          rsn_pairwise=CCMP

    - name: Point hostapd defaults at config file
      lineinfile:
        path: /etc/default/hostapd
        regexp: '^#?DAEMON_CONF='
        line: 'DAEMON_CONF="/etc/hostapd/hostapd.conf"'

    - name: Configure dnsmasq for DHCP and captive-portal DNS
      # bind-interfaces + interface= ensures dnsmasq only listens on wlan0,
      # avoiding conflicts with systemd-resolved on the loopback.
      # address=/#/ap_ip answers ALL DNS queries with the hub's IP so any
      # browser on the network reaches the hub dashboard automatically.
      copy:
        dest: /etc/dnsmasq.d/mcomz-ap.conf
        content: |
          bind-interfaces
          interface={{ wifi_interface }}
          dhcp-range={{ ap_dhcp_start }},{{ ap_dhcp_end }},255.255.255.0,24h
          dhcp-option=option:router,{{ ap_ip }}
          dhcp-option=option:dns-server,{{ ap_ip }}
          address=/#/{{ ap_ip }}
          domain=local
          local=/local/
          expand-hosts

    - name: Set hub hostname to mcomz
      hostname:
        name: mcomz

    - name: Ensure mcomz resolves on localhost
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1\tmcomz"

    # Chroot-safe service enablement: systemctl enable/disable just creates or
    # removes symlinks in /etc/systemd/system/multi-user.target.wants/. We do
    # that directly with the file module so it works both inside the image
    # build chroot (no running systemd) and on a live system.
    - name: Ensure systemd wants directory exists
      file:
        path: /etc/systemd/system/multi-user.target.wants
        state: directory
        mode: '0755'

    - name: Disable hostapd at boot (started by AP fallback service only if needed)
      file:
        path: /etc/systemd/system/multi-user.target.wants/hostapd.service
        state: absent

    - name: Disable dnsmasq at boot (started by AP fallback service only if needed)
      file:
        path: /etc/systemd/system/multi-user.target.wants/dnsmasq.service
        state: absent

    - name: Enable avahi-daemon at boot (mDNS — always needed for mcomz.local)
      file:
        src: /lib/systemd/system/avahi-daemon.service
        dest: /etc/systemd/system/multi-user.target.wants/avahi-daemon.service
        state: link
        force: yes

    - name: Deploy mcomz-apmode-fallback script
      # Waits 5 minutes for a routable LAN IP; if none arrives, activates WiFi AP.
      # This runs on every boot — in normal use it exits immediately once DHCP lands.
      copy:
        dest: /usr/local/bin/mcomz-apmode-fallback
        mode: '0755'
        content: |
          #!/bin/bash
          TIMEOUT=300
          INTERVAL=10
          WIFI="{{ wifi_interface }}"
          AP_IP="{{ ap_ip }}"
          elapsed=0

          # Ensure NM has WiFi profiles from cloud-init before counting down.
          netplan apply 2>/dev/null || true

          has_routable_ip() {
              ip -4 addr show scope global | grep -q 'inet '
          }

          while [ $elapsed -lt $TIMEOUT ]; do
              if has_routable_ip; then
                  logger -t mcomz-apmode "Routable IP found after ${elapsed}s — LAN mode active"
                  exit 0
              fi
              sleep $INTERVAL
              elapsed=$((elapsed + INTERVAL))
          done

          logger -t mcomz-apmode "No LAN after ${TIMEOUT}s — activating WiFi AP fallback"

          # Release wlan0 from NetworkManager so hostapd can own it
          nmcli device set "$WIFI" managed no 2>/dev/null || true

          # Assign static IP to the AP interface
          ip addr flush dev "$WIFI" 2>/dev/null || true
          ip addr add "${AP_IP}/24" dev "$WIFI"
          ip link set "$WIFI" up

          # Start AP services
          systemctl start hostapd
          systemctl start dnsmasq

          logger -t mcomz-apmode "WiFi AP active — SSID: {{ ap_ssid }}, IP: ${AP_IP}"

    - name: Deploy mcomz-apmode-fallback systemd service
      copy:
        dest: /etc/systemd/system/mcomz-apmode-fallback.service
        content: |
          [Unit]
          Description=MComzOS WiFi AP Fallback (activates hotspot if no LAN after 5 min)
          After=network.target
          Wants=network.target

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/usr/local/bin/mcomz-apmode-fallback
          TimeoutStartSec=400

          [Install]
          WantedBy=multi-user.target

    - name: Enable mcomz-apmode-fallback service
      file:
        src: /etc/systemd/system/mcomz-apmode-fallback.service
        dest: /etc/systemd/system/multi-user.target.wants/mcomz-apmode-fallback.service
        state: link
        force: yes

    # ---------------------------------------------------------
    # PHASE 1: CORE SYSTEM & RESILIENCE
    # ---------------------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Upgrade base OS (skipped in build_mode — image is already recent)
      apt:
        upgrade: dist
      when: not (build_mode | default(false))

    - name: Install base tools required by later phases
      apt:
        name:
          - git
          - gnupg
          - python3-apt
          - python3-pip
        state: present

    - name: Ensure mcomz user exists
      user:
        name: "{{ mcomz_user }}"
        state: present
        create_home: yes
        shell: /bin/bash

    - name: Install hardware multiplexing and time-sync tools
      apt:
        name:
          - pipewire
          - libhamlib-utils
          - gpsd
          - gpsd-clients
          - chrony
          - rtl-sdr
        state: present
      when: not (minimal_build | default(false))

    - name: Configure Chrony to prioritize GPS NMEA data
      lineinfile:
        path: /etc/chrony/chrony.conf
        line: "refclock SHM 0 offset 0.5 delay 0.2 refid NMEA"
        state: present
      when: not (minimal_build | default(false))

    # ---------------------------------------------------------
    # PHASE 2: HEADLESS DISPLAY & BROWSER REMOTE DESKTOP
    # ---------------------------------------------------------
    - name: Install TigerVNC, noVNC, and Openbox for headless browser access
      apt:
        name:
          - tigervnc-standalone-server
          - novnc
          - websockify
          - openbox
        state: present

    - name: Create VNC password for mcomz user
      shell: |
        mkdir -p /home/{{ mcomz_user }}/.vnc /home/{{ mcomz_user }}/.config/tigervnc
        echo "{{ vnc_password | default('mcomz') }}" | vncpasswd -f > /home/{{ mcomz_user }}/.vnc/passwd
        cp /home/{{ mcomz_user }}/.vnc/passwd /home/{{ mcomz_user }}/.config/tigervnc/passwd
        chmod 600 /home/{{ mcomz_user }}/.vnc/passwd /home/{{ mcomz_user }}/.config/tigervnc/passwd
        chown -R {{ mcomz_user }}:{{ mcomz_user }} /home/{{ mcomz_user }}/.vnc /home/{{ mcomz_user }}/.config/tigervnc
      args:
        creates: /home/{{ mcomz_user }}/.config/tigervnc/passwd

    - name: Deploy VNC xstartup (launches Openbox window manager)
      copy:
        dest: /home/{{ mcomz_user }}/.vnc/xstartup
        owner: "{{ mcomz_user }}"
        mode: '0755'
        content: |
          #!/bin/bash
          [ -r $HOME/.Xresources ] && xrdb $HOME/.Xresources
          exec dbus-run-session -- openbox-session

    - name: Create Openbox config directory for mcomz user
      file:
        path: /home/{{ mcomz_user }}/.config/openbox
        state: directory
        owner: "{{ mcomz_user }}"
        mode: '0755'

    - name: Deploy Openbox autostart (launches JS8Call on session start)
      copy:
        dest: /home/{{ mcomz_user }}/.config/openbox/autostart
        owner: "{{ mcomz_user }}"
        mode: '0755'
        content: |
          (sleep 2 && js8call) &

    - name: Add mcomz user to audio group for JS8Call sound device access
      user:
        name: "{{ mcomz_user }}"
        groups: audio
        append: yes

    - name: Deploy VNC startup wrapper script
      # Uses Xvnc directly rather than the vncserver Perl wrapper, which is
      # unreliable as a systemd foreground service (may fork unexpectedly or
      # fail to find its environment). The wrapper cleans stale X locks,
      # starts Xvnc in background, then launches the xstartup session.
      copy:
        dest: /usr/local/bin/mcomz-vnc-start
        owner: root
        mode: '0755'
        content: |
          #!/bin/bash
          set -e
          export HOME="/home/{{ mcomz_user }}"

          # Clean up stale X locks from previous crash
          rm -f /tmp/.X1-lock /tmp/.X11-unix/X1 2>/dev/null || true

          # Start Xvnc (the actual server binary, not the Perl wrapper).
          # Do NOT use -localhost: on some systems it binds only to ::1 (IPv6
          # loopback), which makes websockify's 127.0.0.1 target unreachable.
          # Port 5901 is not exposed externally (nginx only proxies it via
          # websockify) so -localhost provides no security benefit here.
          /usr/bin/Xvnc :1 \
              -geometry 1280x800 \
              -depth 24 \
              -rfbauth "$HOME/.vnc/passwd" \
              -rfbport 5901 \
              -SecurityTypes VncAuth &
          XVNC_PID=$!

          # Wait for Xvnc to actually be listening on 5901 (up to 15 seconds)
          # before starting the desktop session. Fixed sleep is brittle under
          # qemu emulation and on slower Pi hardware.
          for _i in $(seq 1 30); do
              (exec 3<>/dev/tcp/127.0.0.1/5901) 2>/dev/null && break
              sleep 0.5
          done
          exec 3>&- 2>/dev/null || true

          # Start the desktop session
          export DISPLAY=:1
          export XAUTHORITY="$HOME/.Xauthority"
          bash "$HOME/.vnc/xstartup" &

          # Block until Xvnc exits (systemd tracks this process)
          wait $XVNC_PID

    - name: Deploy VNC server systemd service
      copy:
        dest: /etc/systemd/system/mcomz-vnc.service
        content: |
          [Unit]
          Description=MComzOS Headless VNC Server
          After=network.target
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          User={{ mcomz_user }}
          ExecStart=/usr/local/bin/mcomz-vnc-start
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target

    - name: Deploy noVNC websockify systemd service
      copy:
        dest: /etc/systemd/system/mcomz-novnc.service
        content: |
          [Unit]
          Description=MComzOS noVNC Browser Gateway
          After=mcomz-vnc.service
          Wants=mcomz-vnc.service
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          ExecStart=/usr/bin/websockify 6080 127.0.0.1:5901
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable VNC and noVNC services
      file:
        src: "/etc/systemd/system/{{ item }}.service"
        dest: "/etc/systemd/system/multi-user.target.wants/{{ item }}.service"
        state: link
        force: yes
      loop:
        - mcomz-vnc
        - mcomz-novnc

    # ---------------------------------------------------------
    # PHASE 3: THE RADIO STACK (HF & VHF)
    # ---------------------------------------------------------
    - name: Install JS8Call
      apt:
        name:
          - js8call
        state: present

    - name: Install HF/VHF radio tools and build dependencies
      apt:
        name:
          - build-essential
          - libasound2-dev
          - direwolf
          - libfuse2
        state: present
      when: not (minimal_build | default(false))

    - name: Resolve Pat latest .deb download URL
      # /releases/latest returns 404 for repos that use pre-release tags (Pat does).
      # /releases?per_page=1 returns the most recent release regardless of pre-release status.
      shell: |
        curl -s ${GITHUB_TOKEN:+-H "Authorization: Bearer $GITHUB_TOKEN"} \
          "https://api.github.com/repos/la5nta/pat/releases?per_page=1" \
          | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        if not data or 'message' in data:
            raise SystemExit('GitHub API error: ' + str(data))
        assets = data[0].get('assets', [])
        url = next(a['browser_download_url'] for a in assets if 'linux_{{ deb_arch }}.deb' in a['name'])
        print(url)
        "
      register: pat_deb_url
      changed_when: false
      # Curl network failure = hard build failure (runner network is broken).
      # The warning task below covers GitHub API rate limits / schema changes
      # as a soft skip (curl succeeds but stdout is empty).
      failed_when: pat_deb_url.rc != 0
      environment:
        GITHUB_TOKEN: "{{ lookup('env', 'GITHUB_TOKEN') }}"  # Explicitly propagate into chroot task
      when: not (minimal_build | default(false))

    - name: Warn if Pat release URL could not be resolved
      debug:
        msg: "Pat release URL could not be resolved (GitHub API error, rate limit, or schema change). Pat (Winlink) will not be installed."
      when:
        - not (minimal_build | default(false))
        - pat_deb_url.rc is defined
        - pat_deb_url.rc == 0
        - pat_deb_url.stdout | default('') | trim | length == 0

    - name: Install Pat (Winlink)
      apt:
        deb: "{{ pat_deb_url.stdout | trim }}"
      when:
        - not (minimal_build | default(false))
        - pat_deb_url.rc is defined
        - pat_deb_url.rc == 0
        - pat_deb_url.stdout | default('') | trim | length > 0

    - name: Download ardopcf pre-built binary
      # pflarue/ardop ships pre-built binaries; building from source fails in ARM64 chroot
      # (rawhid.c type error) and is unnecessary when upstream provides the binary.
      # Arch map: arm64 -> arm_Linux_64, amd64 -> amd64_Linux_64
      block:
        - name: Fetch ardopcf binary from pflarue/ardop releases
          get_url:
            url: "https://github.com/pflarue/ardop/releases/latest/download/ardopcf_{{ 'arm_Linux_64' if deb_arch == 'arm64' else 'amd64_Linux_64' }}"
            dest: /usr/local/bin/ardopcf
            mode: '0755'
      rescue:
        - name: Warn ardopcf download failed
          debug:
            msg: "ardopcf binary download failed (GitHub unavailable or no release for this arch). HF modem (ARDOP) will not work until manually installed."
      when: not (minimal_build | default(false))

    - name: Deploy ardopcf systemd service (HF modem daemon for Pat)
      copy:
        dest: /etc/systemd/system/ardopcf.service
        content: |
          [Unit]
          Description=ardopcf HF Modem Daemon (ARDOP for Pat/Winlink)
          After=sound.target

          [Service]
          Type=simple
          User={{ mcomz_user }}
          ExecStart=/usr/local/bin/ardopcf 8515 {{ ardopcf_audio_in }} {{ ardopcf_audio_out }}
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      when: not (minimal_build | default(false))

    - name: Enable ardopcf service
      file:
        src: /etc/systemd/system/ardopcf.service
        dest: /etc/systemd/system/multi-user.target.wants/ardopcf.service
        state: link
        force: yes
      when: not (minimal_build | default(false))

    - name: Configure Direwolf (VHF APRS software TNC)
      copy:
        dest: /etc/direwolf.conf
        content: |
          # MComzOS Direwolf configuration
          # Change MYCALL to your licensed callsign before enabling HF/VHF operations
          MYCALL {{ callsign }}
          ADEVICE {{ direwolf_audio_device }}
          CHANNEL 0
          MODEM 1200
          # AGWPORT: TCP connection point for APRS apps (e.g. APRS display on dashboard)
          AGWPORT 8010
          # KISSPORT: KISS TNC connection point for Pat VHF gateway
          KISSPORT 8011
      when: not (minimal_build | default(false))

    - name: Deploy Direwolf systemd service
      copy:
        dest: /etc/systemd/system/direwolf.service
        content: |
          [Unit]
          Description=Direwolf VHF Software TNC (APRS decoder and KISS modem)
          After=sound.target
          ConditionPathExists=/dev/snd

          [Service]
          Type=simple
          User={{ mcomz_user }}
          ExecStart=/usr/bin/direwolf -c /etc/direwolf.conf -t 0
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      when: not (minimal_build | default(false))

    - name: Enable Direwolf service
      file:
        src: /etc/systemd/system/direwolf.service
        dest: /etc/systemd/system/multi-user.target.wants/direwolf.service
        state: link
        force: yes
      when: not (minimal_build | default(false))

    - name: Resolve FreeDATA latest AppImage URL
      # FreeDATA does not always publish AppImages; probe the API and skip if absent.
      shell: |
        curl -sf https://api.github.com/repos/DJ2LS/FreeDATA/releases/latest \
          | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        arch = '{{ deb_arch }}'
        for a in data.get('assets', []):
            n = a['name'].lower()
            if n.endswith('.appimage') and 'linux' in n:
                if arch in n or (arch == 'arm64' and 'aarch64' in n) or (arch == 'amd64' and 'x86_64' in n):
                    print(a['browser_download_url']); sys.exit(0)
        sys.exit(1)
        " 2>/dev/null
      register: freedata_url
      failed_when: false
      changed_when: false
      when: not (minimal_build | default(false))

    - name: Download FreeDATA AppImage
      get_url:
        url: "{{ freedata_url.stdout | trim }}"
        dest: /usr/local/bin/freedata
        mode: '0755'
      when:
        - not (minimal_build | default(false))
        - freedata_url.rc is defined
        - freedata_url.rc == 0
        - freedata_url.stdout | trim | length > 0

    # Mercury (rhizomatica/mercury v2) is an HF modem used by FreeDATA. Upstream
    # ships a Debian Trixie (13) apt repo; building from source on Bookworm (12)
    # requires libpulse-dev and a large C toolchain under qemu emulation, and
    # FreeDATA — its only consumer — has no ARM64 build anyway. Once FreeDATA
    # lands on ARM64 (or MComzOS moves to Trixie), switch to the upstream apt
    # repo at debian.hermes.radio. For now, Mercury is intentionally omitted.

    - name: Create Pat config directory
      file:
        path: /home/{{ mcomz_user }}/.config/pat
        state: directory
        owner: "{{ mcomz_user }}"
        mode: '0755'
      when: not (minimal_build | default(false))

    - name: Deploy Pat (Winlink) configuration
      copy:
        dest: /home/{{ mcomz_user }}/.config/pat/config.json
        owner: "{{ mcomz_user }}"
        force: no
        content: |
          {
            "mycall": "{{ callsign }}",
            "secure_login_password": "",
            "auxiliary_addresses": [],
            "locator": "",
            "service_codes": ["PUBLIC"],
            "http_addr": "127.0.0.1:18081",
            "motd": ["MComzOS Winlink Gateway"],
            "connect_aliases": {},
            "listen": [],
            "hamlib_rigs": {},
            "ardop": {
              "addr": "localhost:8515",
              "arq_bandwidth": { "Forced": false, "Max": 2000 },
              "cwid_enabled": false
            },
            "ax25": { "port": "" },
            "serial-tnc": { "port": "", "baud": 9600, "type": "KISS" }
          }
      when: not (minimal_build | default(false))

    - name: Deploy Pat (Winlink) HTTP gateway systemd service
      copy:
        dest: /etc/systemd/system/pat.service
        content: |
          [Unit]
          Description=Pat Winlink HTTP Gateway
          After=network.target ardopcf.service

          [Service]
          Type=simple
          User={{ mcomz_user }}
          ExecStart=/usr/bin/pat http
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      when: not (minimal_build | default(false))

    - name: Enable Pat service
      file:
        src: /etc/systemd/system/pat.service
        dest: /etc/systemd/system/multi-user.target.wants/pat.service
        state: link
        force: yes
      when: not (minimal_build | default(false))

    # ---------------------------------------------------------
    # PHASE 4: LOCAL MESH & OFFLINE HUB
    # ---------------------------------------------------------
    - name: Install Murmur (Mumble VoIP Server for offline voice)
      apt:
        name:
          - mumble-server
          - nodejs
          - npm
        state: present
      when: not (minimal_build | default(false))

    - name: Install mumble-web browser client via npm
      # Wrapped in block/rescue with a hard timeout because the webpack postinstall
      # can stall under qemu ARM64 emulation. A stall or registry outage warns and
      # skips the browser voice client rather than silently masking the failure.
      block:
        - name: Install mumble-web via npm (with timeout)
          shell: timeout 600 npm install -g mumble-web
          args:
            creates: /usr/local/lib/node_modules/mumble-web/package.json
      rescue:
        - name: Warn mumble-web install failed
          debug:
            msg: "mumble-web npm install failed or timed out (webpack stall under qemu ARM64 or npm registry unavailable). Browser voice client won't work until manually installed: npm install -g mumble-web"
      when: not (minimal_build | default(false))

    - name: Deploy Mumble WebSocket bridge service
      # websockify (already installed for noVNC) bridges WebSocket→TCP so
      # the mumble-web HTML5 client can reach Murmur without native app install.
      # Voice uses Opus over WebSocket; adequate for LAN emergency comms.
      copy:
        dest: /etc/systemd/system/mcomz-mumble-ws.service
        content: |
          [Unit]
          Description=MComzOS Mumble WebSocket Bridge (browser voice client)
          After=mumble-server.service
          Requires=mumble-server.service

          [Service]
          Type=simple
          ExecStart=/usr/bin/websockify --ssl-target 64737 localhost:64738
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      when: not (minimal_build | default(false))

    - name: Patch websockify ssl_target to use SSLContext (ssl.wrap_socket removed in Python 3.12)
      # websockify 0.12 on Debian Bookworm calls ssl.wrap_socket() in the --ssl-target
      # code path, which was removed in Python 3.12/3.13. Replace inline with SSLContext.
      # ssl.PROTOCOL_TLS_CLIENT requires server_hostname for SNI even with cert
      # verification disabled (check_hostname=False, verify_mode=CERT_NONE) — omitting
      # server_hostname raises AttributeError on Python 3.12 during the SSL handshake.
      shell: |
        python3 - <<'PYEOF'
        path = '/usr/lib/python3/dist-packages/websockify/websockifyserver.py'
        old = '                    sock = ssl.wrap_socket(sock)'
        new = ('                    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)\n'
               '                    ctx.check_hostname = False\n'
               '                    ctx.verify_mode = ssl.CERT_NONE\n'
               '                    sock = ctx.wrap_socket(sock, server_hostname=\'localhost\')')
        src = open(path).read()
        if old in src:
            open(path, 'w').write(src.replace(old, new, 1))
        PYEOF
      changed_when: true
      when: not (minimal_build | default(false))

    - name: Enable Mumble WebSocket bridge service
      file:
        src: /etc/systemd/system/mcomz-mumble-ws.service
        dest: /etc/systemd/system/multi-user.target.wants/mcomz-mumble-ws.service
        state: link
        force: yes
      when: not (minimal_build | default(false))

    # ---------------------------------------------------------
    # MESHTASTIC INTEGRATION
    # ---------------------------------------------------------
    - name: Install Meshtastic (meshtasticd from OBS)
      # Grouped in a block so a failure anywhere (OBS repo down, GPG key
      # unreachable, Debian archive blocked) cleanly skips the whole Meshtastic
      # install with a single warning instead of cascading misleading errors.
      block:
        - name: Add Debian Bookworm main archive (meshtasticd deps not in Raspbian mirror)
          # meshtasticd requires libgpiod2 and libyaml-cpp0.7 which are in the Debian
          # archive but absent from the Raspbian mirror used by RPi OS Lite images.
          apt_repository:
            repo: "deb http://deb.debian.org/debian bookworm main"
            state: present
            filename: debian-bookworm-main

        - name: Add Meshtastic apt repository GPG key
          get_url:
            url: https://download.opensuse.org/repositories/network:Meshtastic:beta/Debian_12/Release.key
            dest: /tmp/meshtastic-release.key

        - name: Install Meshtastic apt repository GPG key
          shell: >
            gpg --dearmor < /tmp/meshtastic-release.key
            > /etc/apt/trusted.gpg.d/network_Meshtastic_beta.gpg
          args:
            creates: /etc/apt/trusted.gpg.d/network_Meshtastic_beta.gpg

        - name: Add Meshtastic apt repository
          apt_repository:
            repo: "deb http://download.opensuse.org/repositories/network:/Meshtastic:/beta/Debian_12/ /"
            state: present
            filename: meshtastic

        - name: Install meshtasticd (Meshtastic Linux daemon)
          apt:
            name: meshtasticd
            update_cache: yes
            state: present

        - name: Enable meshtasticd built-in web server on port 8080
          # The bundled web client at /usr/share/meshtasticd/web provides a full
          # browser UI for monitoring and configuring the attached LoRa device.
          copy:
            dest: /etc/meshtasticd/config.d/webserver.yaml
            content: |
              Webserver:
                Port: 8080
                RootPath: /usr/share/meshtasticd/web

        - name: Enable meshtasticd service
          file:
            src: /lib/systemd/system/meshtasticd.service
            dest: /etc/systemd/system/multi-user.target.wants/meshtasticd.service
            state: link
            force: yes
      rescue:
        - name: Warn that Meshtastic install was skipped
          debug:
            msg: "Meshtastic install skipped (OBS repo, GPG key, or Debian main unavailable). LoRa hardware will need manual setup after first boot."
      when: not (minimal_build | default(false))

    # ---------------------------------------------------------
    # MESHCORE INTEGRATION (ARM64 / Raspberry Pi only)
    # pyMC_Repeater is a MeshCore daemon that talks to an SX1262 LoRa HAT
    # over SPI. It has no use on x86_64 hardware, so we only install it on
    # aarch64. The package is defined via pyproject.toml (no requirements.txt)
    # and pulls pymc_core[hardware] which needs spidev and RPi-GPIO bindings.
    # ---------------------------------------------------------
    - name: Install Python3 venv and SPI tooling for MeshCore repeater
      apt:
        name:
          - python3-venv
          - python3-dev
          - build-essential
        state: present
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Clone pyMC_Repeater (MeshCore daemon with web dashboard)
      git:
        repo: 'https://github.com/rightup/pyMC_Repeater.git'
        dest: /opt/meshcore-repeater
        update: yes
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Ensure /opt/mcomz directory exists
      file:
        path: /opt/mcomz
        state: directory
        mode: '0755'
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Create MeshCore Python virtual environment
      command:
        cmd: python3 -m venv /opt/mcomz/meshcore-venv
        creates: /opt/mcomz/meshcore-venv/bin/python
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Install pyMC_Repeater into virtualenv (from pyproject.toml)
      # pyMC_Repeater defines its deps in pyproject.toml; there is no
      # requirements.txt. Installing the package itself pulls in pymc_core,
      # cherrypy, paho-mqtt, etc., and registers the `pymc-repeater` entry
      # point. We explicitly upgrade pip first because the Debian-provided pip
      # in python3-venv (~22.x) can reject modern wheel metadata.
      pip:
        name:
          - pip
          - wheel
          - setuptools
        virtualenv: /opt/mcomz/meshcore-venv
        state: latest
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Install pyMC_Repeater package itself
      # Native extensions (pymc_core hardware deps) may fail under qemu ARM64
      # emulation. Wrap in block/rescue so a failure warns loudly but still
      # lets the rest of the build complete — the systemd unit is deployed
      # regardless so the service can run once deps are in place on real HW.
      block:
        - name: pip install pyMC_Repeater into venv
          pip:
            name: "file:///opt/meshcore-repeater"
            virtualenv: /opt/mcomz/meshcore-venv
      rescue:
        - name: Warn pyMC_Repeater install failed
          debug:
            msg: "pyMC_Repeater pip install failed (likely pymc_core native extensions under qemu). MeshCore daemon won't start until manually installed on real hardware: /opt/mcomz/meshcore-venv/bin/pip install file:///opt/meshcore-repeater"
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Ensure MeshCore config directory exists
      file:
        path: /etc/pymc_repeater
        state: directory
        mode: '0755'
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Deploy MeshCore repeater config
      # Minimal starter config. Users MUST edit this to match their LoRa HAT
      # pinout, frequency band (EU/US), and node identity before the daemon
      # can usefully participate in a mesh.
      copy:
        dest: /etc/pymc_repeater/config.yaml
        mode: '0644'
        force: no
        content: |
          repeater:
            node_name: "mcomz-repeater-01"
            latitude: 0.0
            longitude: 0.0
            identity_file: null
            cache_ttl: 60
            send_advert_interval_hours: 10
            allow_discovery: true
          mesh:
            global_flood_allow: true
          radio:
            frequency: 869618000
            tx_power: 14
            bandwidth: 62500
            spreading_factor: 8
            coding_rate: 8
            preamble_length: 17
            sync_word: 13380
            crc_enabled: true
            implicit_header: false
          sx1262:
            bus_id: 0
            cs_id: 0
            cs_pin: 21
            reset_pin: 18
            busy_pin: 20
            irq_pin: 16
            txen_pin: -1
            rxen_pin: -1
            txled_pin: -1
            rxled_pin: -1
            use_dio3_tcxo: false
            is_waveshare: false
          delays:
            tx_delay_factor: 1.0
            direct_tx_delay_factor: 0.5
          duty_cycle:
            enforcement_enabled: false
            max_airtime_per_minute: 3600
          storage:
            storage_dir: "/var/lib/pymc_repeater"
            mqtt:
              enabled: false
              broker: "localhost"
              port: 1883
              username: null
              password: null
              base_topic: "meshcore/repeater"
            retention:
              sqlite_cleanup_days: 31
          letsmesh:
            enabled: false
            iata_code: "Test"
            broker_index: 0
            status_interval: 300
            owner: ""
            email: ""
            disallowed_packet_types: []
          logging:
            level: INFO
            format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
          web:
            cors_enabled: false
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Ensure MeshCore storage directory exists
      file:
        path: /var/lib/pymc_repeater
        state: directory
        owner: "{{ mcomz_user }}"
        mode: '0755'
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Deploy MeshCore Repeater systemd service
      # pyMC_Repeater acts as a MeshCore node over a serial-connected LoRa
      # radio and exposes a CherryPy management dashboard on port 8000.
      copy:
        dest: /etc/systemd/system/mcomz-meshcore.service
        content: |
          [Unit]
          Description=MComzOS MeshCore Repeater and Web Dashboard
          After=network.target
          ConditionPathExists=/dev/spidev0.0

          [Service]
          Type=simple
          User={{ mcomz_user }}
          WorkingDirectory=/opt/meshcore-repeater
          ExecStart=/opt/mcomz/meshcore-venv/bin/python -m repeater.main --config /etc/pymc_repeater/config.yaml
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Enable MeshCore Repeater service
      file:
        src: /etc/systemd/system/mcomz-meshcore.service
        dest: /etc/systemd/system/multi-user.target.wants/mcomz-meshcore.service
        state: link
        force: yes
      when:
        - not (minimal_build | default(false))
        - ansible_architecture == 'aarch64'

    - name: Install Kiwix-Serve (Offline Library)
      apt:
        name: kiwix-tools
        state: present
      when: not (minimal_build | default(false))

    - name: Create MComz ZIM library directory
      file:
        path: /var/mcomz/library
        state: directory
        mode: '0755'
      when: not (minimal_build | default(false))

    - name: Create empty Kiwix library file so kiwix-serve starts with no ZIMs
      copy:
        dest: /var/mcomz/library.xml
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <library version="1.0">
          </library>
        force: no
      when: not (minimal_build | default(false))

    - name: Deploy kiwix-serve systemd service
      copy:
        dest: /etc/systemd/system/kiwix-serve.service
        content: |
          [Unit]
          Description=MComzOS Kiwix Offline Library Server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/kiwix-serve --port 8888 --library /var/mcomz/library.xml --urlRootLocation /library
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      when: not (minimal_build | default(false))

    - name: Enable kiwix-serve service
      file:
        src: /etc/systemd/system/kiwix-serve.service
        dest: /etc/systemd/system/multi-user.target.wants/kiwix-serve.service
        state: link
        force: yes
      when: not (minimal_build | default(false))

    - name: Deploy WikiMed Mini first-boot download script
      # WikiMed Mini (~155 MB) is downloaded on first boot rather than during the
      # chroot build. Build-time downloads time out under qemu emulation and the
      # OPDS catalog query is unreliable without a real network stack.
      # The systemd oneshot (below) runs after network-online.target on first boot
      # and is a no-op if the file already exists (ConditionPathExists=!).
      copy:
        dest: /usr/local/bin/mcomz-wikimed-download
        owner: root
        mode: '0755'
        content: |
          #!/usr/bin/env python3
          """Download WikiMed Mini ZIM on first boot via the Kiwix OPDS catalog."""
          import urllib.request, xml.etree.ElementTree as ET, os, sys

          ZIM_DIR = '/var/mcomz/library'
          DEST    = os.path.join(ZIM_DIR, 'wikimed-mini.zim')

          os.makedirs(ZIM_DIR, exist_ok=True)

          catalog_url = 'https://library.kiwix.org/catalog/v2/entries?lang=eng&name=wikipedia_en_medicine_mini'
          try:
              with urllib.request.urlopen(catalog_url, timeout=60) as r:
                  root = ET.fromstring(r.read())
          except Exception as e:
              print(f'ERROR: Could not query Kiwix catalog: {e}', file=sys.stderr)
              sys.exit(1)

          ns = {'atom': 'http://www.w3.org/2005/Atom'}
          zim_url = None
          for entry in root.findall('atom:entry', ns):
              for link in entry.findall('atom:link', ns):
                  href = link.get('href', '')
                  if href.endswith('.meta4'):
                      zim_url = href[:-6]
                      break
              if zim_url:
                  break

          if not zim_url:
              print('ERROR: WikiMed Mini not found in Kiwix catalog', file=sys.stderr)
              sys.exit(1)

          print(f'Downloading WikiMed Mini from {zim_url} …', flush=True)
          tmp = DEST + '.tmp'
          try:
              with urllib.request.urlopen(zim_url, timeout=600) as r, open(tmp, 'wb') as f:
                  while True:
                      chunk = r.read(1024 * 1024)
                      if not chunk:
                          break
                      f.write(chunk)
              os.rename(tmp, DEST)
              print(f'Done: {DEST}', flush=True)
          except Exception as e:
              if os.path.exists(tmp):
                  os.unlink(tmp)
              print(f'ERROR: Download failed: {e}', file=sys.stderr)
              sys.exit(1)
      when: not (minimal_build | default(false))

    - name: Deploy WikiMed Mini first-boot systemd service
      copy:
        dest: /etc/systemd/system/mcomz-wikimed-download.service
        content: |
          [Unit]
          Description=Download WikiMed Mini ZIM on first boot
          After=network-online.target kiwix-serve.service
          Requires=network-online.target
          ConditionPathExists=!/var/mcomz/library/wikimed-mini.zim

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/mcomz-wikimed-download
          ExecStartPost=/bin/systemctl restart kiwix-serve
          RemainAfterExit=yes
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
      when: not (minimal_build | default(false))

    - name: Enable WikiMed Mini first-boot download service
      file:
        src: /etc/systemd/system/mcomz-wikimed-download.service
        dest: /etc/systemd/system/multi-user.target.wants/mcomz-wikimed-download.service
        state: link
        force: yes
      when: not (minimal_build | default(false))

    - name: Download MComzLibrary ZIMs (Scriptures, Literature, Survival)
      # Fetches the most recent MComzLibrary GitHub release (prerelease-aware —
      # /releases/latest returns 404 for repos that only publish prereleases).
      # Soft failure: if GitHub is unreachable the image boots without these ZIMs.
      # TODO: add a systemd timer to re-check for updated ZIMs on a running system.
      shell: |
        python3 - <<'PYEOF'
        import urllib.request, json, os, sys

        ZIM_DIR = '/var/mcomz/library'
        TOKEN = os.environ.get('GITHUB_TOKEN', '')

        req = urllib.request.Request(
            'https://api.github.com/repos/mcomz-org/MComzLibrary/releases?per_page=1'
        )
        if TOKEN:
            req.add_header('Authorization', f'Bearer {TOKEN}')

        try:
            with urllib.request.urlopen(req, timeout=30) as r:
                data = json.load(r)
        except Exception as e:
            print(f'WARN: Could not fetch MComzLibrary release: {e}', file=sys.stderr)
            sys.exit(0)

        if not data or isinstance(data, dict):
            print(f'WARN: GitHub API error: {data}', file=sys.stderr)
            sys.exit(0)

        zims = [(a['name'], a['browser_download_url'])
                for a in data[0].get('assets', [])
                if a['name'].endswith('.zim')]

        for name, url in zims:
            dest = os.path.join(ZIM_DIR, name)
            if os.path.exists(dest):
                print(f'Already present: {name}')
                continue
            print(f'Downloading {name} ...')
            tmp = dest + '.tmp'
            try:
                with urllib.request.urlopen(url) as r, open(tmp, 'wb') as f:
                    while True:
                        chunk = r.read(1024 * 1024)
                        if not chunk:
                            break
                        f.write(chunk)
                os.rename(tmp, dest)
                print(f'Done: {name}')
            except Exception as e:
                if os.path.exists(tmp):
                    os.unlink(tmp)
                print(f'WARN: Failed to download {name}: {e}', file=sys.stderr)
        PYEOF
      args:
        executable: /bin/bash
      environment:
        GITHUB_TOKEN: "{{ lookup('env', 'GITHUB_TOKEN') }}"
      failed_when: false
      when: not (minimal_build | default(false))

    - name: Register downloaded ZIMs with Kiwix library
      # Writes library.xml directly from ZIM file paths — avoids running
      # kiwix-manage inside the chroot build, where it may fail.
      # kiwix-serve reads all metadata (title, language, description) directly
      # from ZIM file headers at startup; only path + a unique id are needed here.
      shell: |
        python3 - <<'PYEOF'
        import os, uuid

        ZIM_DIR = '/var/mcomz/library'
        LIB_XML = '/var/mcomz/library.xml'

        zims = sorted(f for f in os.listdir(ZIM_DIR) if f.endswith('.zim'))
        if not zims:
            print('No ZIM files found — library.xml left as empty placeholder')
            raise SystemExit(0)

        books = '\n'.join(
            f'  <book id="{uuid.uuid4()}" path="{ZIM_DIR}/{z}"/>'
            for z in zims
        )
        xml = ('<?xml version="1.0" encoding="UTF-8"?>\n'
               '<library version="20110515">\n'
               + books +
               '\n</library>\n')
        with open(LIB_XML, 'w') as f:
            f.write(xml)
        print(f'Registered {len(zims)} ZIM(s) in {LIB_XML}')
        PYEOF
      args:
        executable: /bin/bash
      when: not (minimal_build | default(false))

    # ---------------------------------------------------------
    # KIOSK MODE — physical monitor/keyboard/mouse
    # When a monitor is plugged in, mcomz auto-logs in on tty1 and startx
    # launches Chromium in full-screen kiosk mode pointing at the dashboard.
    # Completely independent of VNC — both paths coexist.
    # ---------------------------------------------------------
    - name: Install kiosk display packages
      apt:
        name:
          - xorg
          - xinit
          - chromium
          - unclutter
        state: present

    - name: Install chromium (RPi OS fallback — package may be chromium-browser)
      shell: apt-get install -y chromium-browser
      failed_when: false

    - name: Create getty@tty1 override directory
      file:
        path: /etc/systemd/system/getty@tty1.service.d
        state: directory

    - name: Auto-login mcomz user on tty1
      copy:
        dest: /etc/systemd/system/getty@tty1.service.d/override.conf
        content: |
          [Service]
          ExecStart=
          ExecStart=-/sbin/agetty --autologin {{ mcomz_user }} --noclear %I $TERM

    - name: Deploy .bash_profile — auto-start X on tty1
      copy:
        dest: /home/{{ mcomz_user }}/.bash_profile
        owner: "{{ mcomz_user }}"
        mode: '0644'
        content: |
          # Start kiosk X session when on tty1 (physical console)
          if [ -z "$DISPLAY" ] && [ "$(tty)" = "/dev/tty1" ]; then
              exec startx
          fi

    - name: Deploy .xinitrc — kiosk browser session
      copy:
        dest: /home/{{ mcomz_user }}/.xinitrc
        owner: "{{ mcomz_user }}"
        mode: '0755'
        content: |
          #!/bin/bash
          # Hide cursor after 5 s of inactivity
          unclutter -idle 5 -root &

          # Disable screen blanking and power saving
          xset s off
          xset -dpms
          xset s noblank

          # Launch dashboard in kiosk mode
          # Retry loop: dashboard may not be up immediately on first boot
          until curl -sf http://localhost/ > /dev/null 2>&1; do
              sleep 2
          done

          exec chromium \
              --kiosk \
              --no-sandbox \
              --disable-infobars \
              --disable-session-crashed-bubble \
              --disable-restore-session-state \
              --noerrdialogs \
              --incognito \
              --check-for-update-interval=31536000 \
              "http://localhost"

    # ---------------------------------------------------------
    # PHASE 5: THE MCOMZ DASHBOARD & SYSTEMD SERVICES
    # ---------------------------------------------------------
    - name: Install Nginx for MComz Captive Portal Dashboard
      apt:
        name: nginx
        state: present

    - name: Deploy MComz HTML Dashboard files
      copy:
        src: ./src/dashboard/
        dest: /var/www/html/
        owner: www-data

    - name: Provision MeshCore offline firmware flasher
      # Clones the MeshCore web flasher and Heltec V3/V4 firmware so users can
      # flash radios from the dashboard without internet (hotspot/offline mode).
      # Served at /meshcore-flash/; dashboard detects connectivity and routes there
      # when flasher.meshcore.co.uk is unreachable.
      block:
        - name: Create MeshCore flasher directories
          file:
            path: "{{ item }}"
            state: directory
            owner: www-data
            mode: '0755'
          loop:
            - /var/www/html/meshcore-flash
            - /var/www/html/meshcore-flash/firmware

        - name: Clone MeshCore web flasher (shallow)
          shell: |
            git clone --depth=1 https://github.com/meshcore-dev/flasher.meshcore.io.git \
              /var/www/html/meshcore-flash
          args:
            creates: /var/www/html/meshcore-flash/index.html

        - name: Patch flasher for /meshcore-flash/ subpath serving
          # The flasher app uses absolute paths (/lib/, /css/, /config.json) — it was
          # designed to be served from the domain root. Rewrite to /meshcore-flash/-
          # prefixed paths so nginx alias resolves them correctly. Also update
          # config.json staticPath so firmware binaries are fetched locally.
          shell: |
            python3 << 'PYEOF'
            import re, json, os

            with open('/var/www/html/meshcore-flash/index.html') as f:
                html = f.read()
            html = re.sub(
                r'(<(?:script|link|img)[^>]+ (?:src|href))="/((?!meshcore-flash/))',
                r'\1="/meshcore-flash/\2', html)
            html = html.replace("'/config.json'", "'/meshcore-flash/config.json'")
            html = html.replace('"/config.json"', '"/meshcore-flash/config.json"')
            with open('/var/www/html/meshcore-flash/index.html', 'w') as f:
                f.write(html)

            js_path = '/var/www/html/meshcore-flash/flasher.js'
            if os.path.exists(js_path):
                with open(js_path) as f:
                    js = f.read()
                js = js.replace("'/config.json'", "'/meshcore-flash/config.json'")
                js = js.replace('"/config.json"', '"/meshcore-flash/config.json"')
                with open(js_path, 'w') as f:
                    f.write(js)

            with open('/var/www/html/meshcore-flash/config.json') as f:
                cfg = json.load(f)
            cfg['staticPath'] = '/meshcore-flash/firmware'
            with open('/var/www/html/meshcore-flash/config.json', 'w') as f:
                json.dump(cfg, f)
            PYEOF

        - name: Resolve MeshCore latest Heltec firmware URLs
          shell: |
            curl -sf ${GITHUB_TOKEN:+-H "Authorization: Bearer $GITHUB_TOKEN"} \
              "https://api.github.com/repos/meshcore-dev/MeshCore/releases/latest" \
              | python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            urls = [a['browser_download_url'] for a in data.get('assets', [])
                    if 'heltec' in a['name'].lower()]
            print('\n'.join(urls))
            "
          register: meshcore_fw_urls
          changed_when: false
          failed_when: meshcore_fw_urls.rc != 0
          environment:
            GITHUB_TOKEN: "{{ lookup('env', 'GITHUB_TOKEN') }}"

        - name: Download Heltec V3/V4 MeshCore firmware binaries
          get_url:
            url: "{{ item }}"
            dest: "/var/www/html/meshcore-flash/firmware/{{ item | basename }}"
            owner: www-data
            mode: '0644'
          loop: "{{ meshcore_fw_urls.stdout_lines | select('match', '.+') | list }}"
          when: meshcore_fw_urls.stdout_lines | length > 0

      rescue:
        - name: Warn MeshCore offline flasher provisioning failed
          debug:
            msg: "MeshCore offline flasher could not be provisioned (GitHub unavailable or clone failed). Flash button will always link to flasher.meshcore.co.uk."
      when: not (minimal_build | default(false))

    - name: Deploy MComzOS status API script
      copy:
        src: ./src/api/status.py
        dest: /usr/local/bin/mcomz-status
        mode: '0755'

    - name: Deploy status API systemd service
      copy:
        dest: /etc/systemd/system/mcomz-status.service
        content: |
          [Unit]
          Description=MComzOS Status API (service health JSON on localhost:9000)
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/python3 /usr/local/bin/mcomz-status
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Enable status API service
      file:
        src: /etc/systemd/system/mcomz-status.service
        dest: /etc/systemd/system/multi-user.target.wants/mcomz-status.service
        state: link
        force: yes

    - name: Create TLS certificate directory
      file:
        path: /etc/ssl/mcomz
        state: directory
        mode: '0755'

    - name: Generate self-signed TLS certificate for HTTPS
      # Browsers require HTTPS for getUserMedia() (microphone access in Mumble).
      # Self-signed cert is acceptable for a closed LAN emergency hub — users
      # accept it once in the browser, then microphone and VNC audio both work.
      command: >
        openssl req -x509 -nodes -days 397
        -newkey rsa:2048
        -keyout /etc/ssl/mcomz/mcomz.key
        -out /etc/ssl/mcomz/mcomz.crt
        -subj "/CN=mcomz.local/O=MComzOS/C=XX"
        -addext "subjectAltName=DNS:mcomz.local,DNS:mcomz,IP:192.168.4.1"
      # 397 days: iOS Safari hard-blocks self-signed certs with validity > 398 days (since iOS 14)
      args:
        creates: /etc/ssl/mcomz/mcomz.crt

    - name: Deploy nginx site config with service proxy rules
      copy:
        dest: /etc/nginx/sites-available/mcomz
        content: |
          # HTTP server — serves the full dashboard on port 80.
          # iOS Safari refuses self-signed certs without manual trust-store installation,
          # so redirecting HTTP→HTTPS makes MComzOS unreachable on iOS. Serving on plain
          # HTTP means the dashboard, library, and status API all work on every device
          # without any certificate interaction. Mumble microphone requires HTTPS (getUserMedia),
          # so users who want voice chat will still need to accept the cert once on HTTPS.
          server {
              listen 80 default_server;
              server_name mcomz.local mcomz _;
              root /var/www/html;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:9000/api/;
              }

              location /library/ {
                  proxy_pass http://127.0.0.1:8888/library/;
              }

              location /mumble/ws {
                  proxy_pass http://127.0.0.1:64737/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
              }
              location /mumble/ {
                  alias /usr/local/lib/node_modules/mumble-web/dist/;
                  index index.html;
                  try_files $uri $uri/ /mumble/index.html;
              }

              location /meshtastic/ {
                  proxy_pass http://127.0.0.1:8080/;
              }

              location /meshcore/ {
                  proxy_pass http://127.0.0.1:8000/;
              }

              location /vnc/ {
                  alias /usr/share/novnc/;
                  index vnc.html;
              }
              location /vnc/websockify {
                  proxy_pass http://127.0.0.1:6080/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_read_timeout 86400;
              }

              # MeshCore offline firmware flasher (used when internet is unavailable)
              location /meshcore-flash/ {
                  alias /var/www/html/meshcore-flash/;
                  index index.html;
              }
          }

          server {
              listen 443 ssl default_server;
              server_name mcomz.local mcomz _;
              ssl_certificate /etc/ssl/mcomz/mcomz.crt;
              ssl_certificate_key /etc/ssl/mcomz/mcomz.key;
              root /var/www/html;
              index index.html;

              # iOS Safari auto-upgrades bare hostnames to HTTPS (iOS 15+) and
              # won't create a persistent exception for self-signed certs in iOS 18.
              # Serving the full dashboard here re-triggers fetch() calls that Safari
              # re-blocks. Instead, return a minimal redirect page so the user lands
              # on HTTP where everything works without certificate interaction.
              location / {
                  default_type text/html;
                  return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MComzOS</title><style>body{background:#121212;color:#e0e0e0;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;text-align:center;padding:24px}a{color:#29b6f6;font-size:1.1rem}</style></head><body><div><h2>MComzOS</h2><p style="margin:16px 0;color:#aaa">The dashboard runs over HTTP to avoid certificate warnings on phones.</p><p><a href="http://mcomz.local/">Open Dashboard &rarr; http://mcomz.local/</a></p><p style="margin-top:20px;font-size:0.8rem;color:#666">HTTPS is available for Mumble voice chat at <a href="/mumble/" style="font-size:0.8rem">/mumble/</a></p></div></body></html>';
              }

              # Status API (Python service on localhost:9000)
              location /api/ {
                  proxy_pass http://127.0.0.1:9000/api/;
              }

              # Offline Library (kiwix-serve on port 8888)
              # kiwix uses --urlRootLocation /library so it expects the full /library/...
              # path — do NOT strip the prefix (proxy_pass must include /library/)
              location /library/ {
                  proxy_pass http://127.0.0.1:8888/library/;
              }

              # Mumble browser voice client — static files served by nginx,
              # WebSocket tunnel proxied to websockify (TCP-only on port 64737)
              location /mumble/ws {
                  proxy_pass http://127.0.0.1:64737/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
              }
              location /mumble/ {
                  alias /usr/local/lib/node_modules/mumble-web/dist/;
                  index index.html;
                  try_files $uri $uri/ /mumble/index.html;
              }

              # Meshtastic web UI (meshtasticd on port 8080)
              location /meshtastic/ {
                  proxy_pass http://127.0.0.1:8080/;
              }

              # MeshCore web dashboard (pyMC_Repeater on port 8000)
              location /meshcore/ {
                  proxy_pass http://127.0.0.1:8000/;
              }

              # noVNC browser remote desktop — static files served by nginx,
              # WebSocket tunnel proxied to websockify (VNC-tunnel-only on port 6080)
              location /vnc/ {
                  alias /usr/share/novnc/;
                  index vnc.html;
              }
              location /vnc/websockify {
                  proxy_pass http://127.0.0.1:6080/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_read_timeout 86400;
              }
          }

          # Pat Winlink — served on its own HTTPS port so its absolute-path
          # Vue.js frontend works without subpath rewriting.
          server {
              listen 8081 ssl default_server;
              server_name mcomz.local mcomz _;
              ssl_certificate /etc/ssl/mcomz/mcomz.crt;
              ssl_certificate_key /etc/ssl/mcomz/mcomz.key;

              location / {
                  proxy_pass http://127.0.0.1:18081/;
                  proxy_set_header Host $host;
              }
          }

    - name: Write MComzOS version file
      copy:
        dest: /etc/mcomzos-version
        content: "{{ mcomzos_version | default('unknown') }}\n"
        mode: '0644'

    - name: Enable MComz nginx site
      file:
        src: /etc/nginx/sites-available/mcomz
        dest: /etc/nginx/sites-enabled/mcomz
        state: link

    - name: Disable default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Enable nginx service at boot (chroot-safe symlink — deb-systemd-helper defers enables in chroot)
      file:
        src: /lib/systemd/system/nginx.service
        dest: /etc/systemd/system/multi-user.target.wants/nginx.service
        state: link
        force: yes

    - name: Create nginx systemd drop-in directory
      file:
        path: /etc/systemd/system/nginx.service.d
        state: directory
        mode: '0755'

    - name: Add nginx restart-on-failure drop-in
      # nginx ships without Restart= in its unit file; a drop-in ensures it retries
      # on first-boot if a transient condition (e.g. systemd settling) caused it to fail.
      copy:
        dest: /etc/systemd/system/nginx.service.d/restart.conf
        content: |
          [Service]
          Restart=on-failure
          RestartSec=5
        owner: root
        mode: '0644'

    - name: Configure OverlayFS (Read-Only Root) for power-pull safety — RPi
      command: raspi-config nonint enable_overlayfs
      notify: Reboot System
      when:
        - ansible_architecture == 'aarch64'
        - not (build_mode | default(false))

    - name: Install overlayroot for write-protection on x86_64
      apt:
        name: overlayroot
        state: present
      when:
        - ansible_architecture == 'x86_64'
        - not (build_mode | default(false))

    - name: Configure OverlayFS (Read-Only Root) for power-pull safety — x86_64
      copy:
        dest: /etc/overlayroot.conf
        content: |
          overlayroot="tmpfs"
          overlayroot_cfgdisk="disabled"
      notify: Update initramfs
      when:
        - ansible_architecture == 'x86_64'
        - not (build_mode | default(false))

  handlers:
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded

    - name: Update initramfs
      command: update-initramfs -u

    - name: Reboot System
      reboot:
